<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#6366f1">
<title>読み上げ算</title>
<link rel="manifest" href="manifest.json">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary: #6366f1;
  --primary-light: #818cf8;
  --primary-dark: #4f46e5;
  --primary-bg: #eef2ff;
  --accent: #f59e0b;
  --success: #22c55e;
  --success-bg: #dcfce7;
  --danger: #ef4444;
  --danger-bg: #fee2e2;
  --bg: #f8fafc;
  --card: #ffffff;
  --text: #1e293b;
  --text-light: #64748b;
  --border: #e2e8f0;
  --radius: 16px;
  --radius-sm: 12px;
  --shadow: 0 4px 24px rgba(99,102,241,0.12);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
}

html, body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* ── Screens ── */
.screen {
  display: none;
  flex-direction: column;
  align-items: center;
  min-height: 100dvh;
  padding: 24px 16px;
  gap: 16px;
}
.screen.active { display: flex; }

/* ── Typography ── */
h1 {
  font-size: 1.8rem;
  color: var(--primary);
  text-align: center;
}
h2 {
  font-size: 1.3rem;
  color: var(--primary);
  text-align: center;
}

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  font-weight: 700;
  padding: 14px 28px;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.1s;
  min-height: 52px;
  min-width: 100px;
  touch-action: manipulation;
}
.btn:active { transform: scale(0.96); }

.btn-primary {
  background: var(--primary);
  color: #fff;
  box-shadow: var(--shadow);
}
.btn-primary:hover { background: var(--primary-dark); }

.btn-secondary {
  background: var(--border);
  color: var(--text);
}

.btn-success {
  background: var(--success);
  color: #fff;
}

.btn-danger {
  background: var(--danger);
  color: #fff;
}

.btn-large {
  font-size: 1.4rem;
  padding: 20px 40px;
  border-radius: 20px;
  width: 100%;
  max-width: 340px;
}

.btn-outline {
  background: transparent;
  border: 2px solid var(--primary);
  color: var(--primary);
}

/* ── Toggle Switch ── */
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
}
.toggle-row .toggle-label {
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--text);
}
.toggle {
  position: relative;
  width: 52px;
  height: 30px;
  flex-shrink: 0;
}
.toggle input {
  opacity: 0;
  width: 0;
  height: 0;
}
.toggle-slider {
  position: absolute;
  cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #cbd5e1;
  border-radius: 15px;
  transition: 0.2s;
}
.toggle-slider::before {
  content: '';
  position: absolute;
  height: 24px;
  width: 24px;
  left: 3px;
  bottom: 3px;
  background: white;
  border-radius: 50%;
  transition: 0.2s;
}
.toggle input:checked + .toggle-slider {
  background: var(--primary);
}
.toggle input:checked + .toggle-slider::before {
  transform: translateX(22px);
}

/* ══════════════════════════════════
   SETTINGS SCREEN
   ══════════════════════════════════ */
#screen-settings {
  justify-content: flex-start;
  padding-top: 32px;
  padding-bottom: 100px;
}
.settings-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px 16px;
  width: 100%;
  max-width: 400px;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.setting-group label {
  display: block;
  font-weight: 700;
  font-size: 0.95rem;
  margin-bottom: 8px;
  color: var(--text);
}
.setting-group .setting-hint {
  font-size: 0.8rem;
  color: var(--text-light);
  margin-bottom: 6px;
}
.option-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.option-btn {
  flex: 1;
  min-width: 52px;
  padding: 10px 6px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  background: #fff;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  color: var(--text);
  touch-action: manipulation;
}
.option-btn.selected {
  border-color: var(--primary);
  background: var(--primary-bg);
  color: var(--primary);
}

/* Speed stars */
.speed-btn {
  min-width: 48px;
  font-size: 0.85rem;
}

/* Digit range */
.digit-range {
  display: flex;
  align-items: center;
  gap: 8px;
}
.digit-range .range-label {
  font-size: 0.85rem;
  color: var(--text-light);
  white-space: nowrap;
}
.digit-range .option-buttons {
  flex: 1;
}
.digit-range .option-btn {
  min-width: 36px;
  padding: 8px 4px;
  font-size: 0.85rem;
}

/* Kuchi buttons */
.kuchi-buttons {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
}
.kuchi-buttons .option-btn {
  min-width: unset;
  padding: 10px 4px;
  font-size: 0.9rem;
}

/* Start button fixed at bottom */
.start-btn-wrap {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 16px;
  background: linear-gradient(transparent, var(--bg) 30%);
  display: flex;
  justify-content: center;
  z-index: 10;
}

/* ══════════════════════════════════
   GAME (PLAY) SCREEN
   ══════════════════════════════════ */
#screen-play {
  background: #1e1b4b;
  justify-content: center;
  gap: 0;
  position: relative;
}
.play-status {
  color: rgba(255,255,255,0.5);
  font-size: 0.95rem;
  margin-bottom: 8px;
}
.play-number {
  color: #fff;
  font-size: 4.5rem;
  font-weight: 900;
  text-align: center;
  min-height: 90px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.15s;
  padding: 0 16px;
}
.play-reading {
  color: var(--primary-light);
  font-size: 1.1rem;
  margin-top: 8px;
  min-height: 2em;
  text-align: center;
}
.progress-bar {
  width: 80%;
  max-width: 300px;
  height: 6px;
  background: rgba(255,255,255,0.15);
  border-radius: 3px;
  margin-top: 32px;
  overflow: hidden;
}
.progress-bar-inner {
  height: 100%;
  background: var(--primary-light);
  border-radius: 3px;
  transition: width 0.3s;
  width: 0%;
}
.stop-btn {
  position: absolute;
  top: 16px;
  right: 16px;
  background: rgba(255,255,255,0.15);
  border: none;
  color: rgba(255,255,255,0.7);
  font-size: 1rem;
  padding: 10px 16px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  touch-action: manipulation;
}
.stop-btn:active { background: rgba(255,255,255,0.25); }

.loading-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #1e1b4b;
  gap: 16px;
  z-index: 5;
}
.loading-overlay .spinner {
  width: 48px;
  height: 48px;
  border: 4px solid rgba(255,255,255,0.2);
  border-top-color: var(--primary-light);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.loading-overlay p {
  color: rgba(255,255,255,0.7);
  font-size: 1.1rem;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ══════════════════════════════════
   ANSWER (INPUT) SCREEN
   ══════════════════════════════════ */
#screen-answer {
  justify-content: flex-start;
  padding-top: 36px;
}
.answer-display {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px 20px;
  width: 100%;
  max-width: 360px;
  text-align: right;
  font-size: 2.8rem;
  font-weight: 900;
  color: var(--text);
  min-height: 72px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  justify-content: flex-end;
  overflow: hidden;
}
.answer-display .placeholder { color: #cbd5e1; }

.numpad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  width: 100%;
  max-width: 320px;
  margin-top: 12px;
}
.numpad-btn {
  font-size: 1.6rem;
  font-weight: 700;
  padding: 16px;
  border: none;
  border-radius: 14px;
  background: var(--card);
  color: var(--text);
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: transform 0.08s;
  touch-action: manipulation;
  min-height: 56px;
}
.numpad-btn:active { transform: scale(0.94); background: #f1f5f9; }
.numpad-btn.special { background: var(--border); font-size: 1.2rem; }
.numpad-btn.minus-btn { background: #fef3c7; color: #92400e; }
.numpad-btn.minus-btn.negative { background: var(--danger); color: #fff; }

.answer-actions {
  width: 100%;
  max-width: 320px;
  margin-top: 12px;
}
.answer-actions .btn { width: 100%; }

/* ══════════════════════════════════
   RESULT SCREEN
   ══════════════════════════════════ */
#screen-result {
  justify-content: center;
  gap: 20px;
}
.result-mark {
  font-size: 7rem;
  line-height: 1;
}
.result-correct { color: var(--success); }
.result-wrong { color: var(--danger); }

.result-info {
  text-align: center;
}
.result-label {
  font-size: 1rem;
  color: var(--text-light);
  margin-bottom: 4px;
}
.result-value {
  font-size: 2.5rem;
  font-weight: 900;
  color: var(--text);
}
.result-your-answer {
  font-size: 1rem;
  color: var(--text-light);
  margin-top: 8px;
}
.result-your-answer strong {
  color: var(--danger);
}

.result-actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 100%;
  max-width: 320px;
  margin-top: 8px;
}
.result-actions .btn { width: 100%; }

/* ── Animations ── */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeIn 0.3s ease; }

@keyframes pop {
  0% { transform: scale(0.5); opacity: 0; }
  60% { transform: scale(1.15); }
  100% { transform: scale(1); opacity: 1; }
}
.pop { animation: pop 0.4s ease; }

@keyframes flash-in {
  from { opacity: 0; transform: scale(1.3); }
  to { opacity: 1; transform: scale(1); }
}
.flash-in { animation: flash-in 0.25s ease-out; }

/* ── Responsive ── */
@media (max-width: 360px) {
  .play-number { font-size: 3.5rem; }
  .answer-display { font-size: 2.2rem; }
  .numpad-btn { padding: 14px; font-size: 1.4rem; }
}
</style>
</head>
<body>

<!-- ===== SETTINGS SCREEN (initial) ===== -->
<div id="screen-settings" class="screen active">
  <h1>🧮 読み上げ算</h1>
  <div class="settings-card fade-in">

    <!-- 計算種類 -->
    <div class="setting-group">
      <label>計算種類</label>
      <div class="option-buttons" id="calc-type-options">
        <button class="option-btn selected" onclick="setCalcType('add')" id="btn-calc-add">加算のみ</button>
        <button class="option-btn" onclick="setCalcType('addsub')" id="btn-calc-addsub">加減算</button>
      </div>
    </div>

    <!-- 読み上げ速度 -->
    <div class="setting-group">
      <label>読み上げ速度</label>
      <div class="option-buttons" id="speed-options">
        <button class="option-btn speed-btn" onclick="setSpeed(1)" id="btn-speed-1">★1</button>
        <button class="option-btn speed-btn" onclick="setSpeed(2)" id="btn-speed-2">★2</button>
        <button class="option-btn speed-btn selected" onclick="setSpeed(3)" id="btn-speed-3">★3</button>
        <button class="option-btn speed-btn" onclick="setSpeed(4)" id="btn-speed-4">★4</button>
        <button class="option-btn speed-btn" onclick="setSpeed(5)" id="btn-speed-5">★5</button>
      </div>
    </div>

    <!-- 出題桁数 -->
    <div class="setting-group">
      <label>出題桁数</label>
      <div class="digit-range">
        <span class="range-label">下限</span>
        <div class="option-buttons" id="digit-min-options"></div>
      </div>
      <div class="digit-range" style="margin-top:6px;">
        <span class="range-label">上限</span>
        <div class="option-buttons" id="digit-max-options"></div>
      </div>
    </div>

    <!-- 口数 -->
    <div class="setting-group">
      <label>口数</label>
      <div class="kuchi-buttons" id="kuchi-options"></div>
    </div>

    <!-- 数字表示 -->
    <div class="setting-group">
      <div class="toggle-row">
        <span class="toggle-label">読み上げ中の数字表示</span>
        <label class="toggle">
          <input type="checkbox" id="toggle-show-number" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <!-- 自動解答表示 -->
    <div class="setting-group">
      <div class="toggle-row">
        <span class="toggle-label">出題後の自動解答表示</span>
        <label class="toggle">
          <input type="checkbox" id="toggle-auto-answer">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

  </div>

  <div class="start-btn-wrap">
    <button class="btn btn-primary btn-large" onclick="startGame()">スタート</button>
  </div>
</div>

<!-- ===== GAME (PLAY) SCREEN ===== -->
<div id="screen-play" class="screen">
  <button class="stop-btn" onclick="stopGame()">■ やめる</button>
  <p class="play-status" id="play-status"></p>
  <div class="play-number" id="play-number"></div>
  <p class="play-reading" id="play-reading"></p>
  <div class="progress-bar"><div class="progress-bar-inner" id="progress-bar"></div></div>
  <div class="loading-overlay" id="loading-overlay" style="display:none;">
    <div class="spinner"></div>
    <p>音声を準備中...</p>
  </div>
</div>

<!-- ===== ANSWER (INPUT) SCREEN ===== -->
<div id="screen-answer" class="screen">
  <h2>こたえを入れてね</h2>
  <div class="answer-display" id="answer-display"><span class="placeholder">0</span></div>
  <div class="numpad">
    <button class="numpad-btn" onclick="inputDigit('7')">7</button>
    <button class="numpad-btn" onclick="inputDigit('8')">8</button>
    <button class="numpad-btn" onclick="inputDigit('9')">9</button>
    <button class="numpad-btn" onclick="inputDigit('4')">4</button>
    <button class="numpad-btn" onclick="inputDigit('5')">5</button>
    <button class="numpad-btn" onclick="inputDigit('6')">6</button>
    <button class="numpad-btn" onclick="inputDigit('1')">1</button>
    <button class="numpad-btn" onclick="inputDigit('2')">2</button>
    <button class="numpad-btn" onclick="inputDigit('3')">3</button>
    <button class="numpad-btn minus-btn" id="minus-btn" onclick="toggleMinus()">±</button>
    <button class="numpad-btn" onclick="inputDigit('0')">0</button>
    <button class="numpad-btn special" onclick="backspace()">⌫</button>
  </div>
  <div class="answer-actions">
    <button class="btn btn-primary btn-large" onclick="submitAnswer()">解答する</button>
  </div>
</div>

<!-- ===== RESULT SCREEN ===== -->
<div id="screen-result" class="screen">
  <div class="result-mark pop" id="result-mark"></div>
  <div class="result-info">
    <div class="result-label">正解</div>
    <div class="result-value" id="result-correct-value"></div>
    <div class="result-your-answer" id="result-your-answer"></div>
  </div>
  <div class="result-actions">
    <button class="btn btn-primary" onclick="retryGame()">この問題にもう一度挑戦</button>
    <button class="btn btn-success" onclick="newGame()">同じ設定で新しい問題</button>
    <button class="btn btn-secondary" onclick="goToSettings()">設定に戻る</button>
  </div>
</div>

<script>
// ══════════════════════════════════
// State
// ══════════════════════════════════
let config = {
  calcType: 'add',     // 'add' | 'addsub'
  speed: 3,            // 1-5
  digitMin: 1,
  digitMax: 3,
  kuchi: 5,
  showNumber: true,
  autoAnswer: false
};

let numbers = [];
let correctAnswer = 0;
let userAnswer = '';
let isNegative = false;
let currentAudio = null;
let displayInterval = null;
let lastSpeechText = '';

// Speed: ★ → TTS param
const speedToParam = { 1: 'slow', 2: 'slow', 3: 'normal', 4: 'fast', 5: 'veryfast' };

// ══════════════════════════════════
// Settings UI Init
// ══════════════════════════════════
function initSettingsUI() {
  // Digit min (1-10)
  const minEl = document.getElementById('digit-min-options');
  minEl.innerHTML = '';
  for (let d = 1; d <= 10; d++) {
    const btn = document.createElement('button');
    btn.className = 'option-btn' + (config.digitMin === d ? ' selected' : '');
    btn.textContent = d;
    btn.onclick = () => {
      config.digitMin = d;
      if (config.digitMax < d) { config.digitMax = d; renderDigitMax(); }
      refreshSelected(minEl, btn);
    };
    minEl.appendChild(btn);
  }

  renderDigitMax();

  // Kuchi (3-15)
  const kuchiEl = document.getElementById('kuchi-options');
  kuchiEl.innerHTML = '';
  for (let k = 3; k <= 15; k++) {
    const btn = document.createElement('button');
    btn.className = 'option-btn' + (config.kuchi === k ? ' selected' : '');
    btn.textContent = k;
    btn.onclick = () => { config.kuchi = k; refreshSelected(kuchiEl, btn); };
    kuchiEl.appendChild(btn);
  }
}

function renderDigitMax() {
  const maxEl = document.getElementById('digit-max-options');
  maxEl.innerHTML = '';
  for (let d = 1; d <= 15; d++) {
    const btn = document.createElement('button');
    btn.className = 'option-btn' + (config.digitMax === d ? ' selected' : '');
    if (d < config.digitMin) {
      btn.style.opacity = '0.3';
      btn.style.pointerEvents = 'none';
    }
    btn.textContent = d;
    btn.onclick = () => {
      config.digitMax = d;
      refreshSelected(maxEl, btn);
    };
    maxEl.appendChild(btn);
  }
}

function refreshSelected(container, selectedBtn) {
  container.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  selectedBtn.classList.add('selected');
}

function setCalcType(type) {
  config.calcType = type;
  document.getElementById('btn-calc-add').classList.toggle('selected', type === 'add');
  document.getElementById('btn-calc-addsub').classList.toggle('selected', type === 'addsub');
}

function setSpeed(level) {
  config.speed = level;
  for (let i = 1; i <= 5; i++) {
    document.getElementById('btn-speed-' + i).classList.toggle('selected', i === level);
  }
}

// ══════════════════════════════════
// Screen Management
// ══════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goToSettings() {
  cleanupAudio();
  showScreen('screen-settings');
}

function stopGame() {
  cleanupAudio();
  showScreen('screen-settings');
}

function cleanupAudio() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.src = '';
    currentAudio = null;
  }
  if (displayInterval) {
    clearInterval(displayInterval);
    displayInterval = null;
  }
}

// ══════════════════════════════════
// Number Generation
// ══════════════════════════════════
function generateNumbers() {
  numbers = [];
  const dMin = config.digitMin;
  const dMax = config.digitMax;

  function randomNumber() {
    // Pick random digit count between min and max
    const d = dMin + Math.floor(Math.random() * (dMax - dMin + 1));
    const lo = d === 1 ? 1 : Math.pow(10, d - 1);
    const hi = Math.pow(10, d) - 1;
    return randInt(lo, hi);
  }

  // First number always positive
  numbers.push(randomNumber());
  let runningTotal = numbers[0];

  for (let i = 1; i < config.kuchi; i++) {
    const isLast = (i === config.kuchi - 1);
    let n = randomNumber();

    // ~25% chance of subtraction in addsub mode
    const doSubtract = config.calcType === 'addsub' && Math.random() < 0.25;

    if (doSubtract) {
      // Ensure running total doesn't go negative
      if (n > runningTotal) {
        n = randInt(1, Math.max(1, runningTotal - 1));
      }
      if (n > 0 && n <= runningTotal) {
        numbers.push(-n);
        runningTotal -= n;
      } else {
        numbers.push(n);
        runningTotal += n;
      }
    } else {
      numbers.push(n);
      runningTotal += n;
    }
  }

  correctAnswer = numbers.reduce((a, b) => a + b, 0);
}

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

// ══════════════════════════════════
// Speech Text Builder
// ══════════════════════════════════
function buildSpeechText() {
  const parts = [];
  parts.push('願いましては〜〜、');

  numbers.forEach((n, i) => {
    const absN = Math.abs(n);
    const isLast = (i === numbers.length - 1);

    if (isLast) {
      if (n < 0) {
        parts.push('ひく' + absN + '円では〜。');
      } else {
        parts.push(absN + '円では〜。');
      }
    } else {
      if (n < 0) {
        parts.push('ひく' + absN + '円、');
      } else {
        parts.push(absN + '円なり〜、');
      }
    }
  });

  return parts.join('');
}

// ══════════════════════════════════
// TTS
// ══════════════════════════════════
async function fetchTTS(text) {
  const speedParam = speedToParam[config.speed] || 'normal';
  const res = await fetch('/api/tts', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text: text, speed: speedParam })
  });
  if (!res.ok) throw new Error('TTS API error: ' + res.status);
  const { audioContent, mimeType } = await res.json();
  const mime = mimeType || 'audio/wav';
  const audio = new Audio('data:' + mime + ';base64,' + audioContent);
  return audio;
}

// ══════════════════════════════════
// Game Flow
// ══════════════════════════════════
async function startGame() {
  // Read toggle states
  config.showNumber = document.getElementById('toggle-show-number').checked;
  config.autoAnswer = document.getElementById('toggle-auto-answer').checked;

  generateNumbers();
  lastSpeechText = buildSpeechText();

  // Show play screen with loading
  showScreen('screen-play');
  const loadingOverlay = document.getElementById('loading-overlay');
  loadingOverlay.style.display = 'flex';

  const playNumber = document.getElementById('play-number');
  const playReading = document.getElementById('play-reading');
  const playStatus = document.getElementById('play-status');
  const progressBar = document.getElementById('progress-bar');

  playNumber.textContent = '';
  playReading.textContent = '';
  playStatus.textContent = '';
  progressBar.style.width = '0%';

  // Fetch TTS audio
  let audio;
  try {
    audio = await fetchTTS(lastSpeechText);
  } catch (e) {
    console.error('TTS failed:', e);
    loadingOverlay.style.display = 'none';
    playReading.textContent = '音声の準備に失敗しました';
    setTimeout(() => goToSettings(), 2000);
    return;
  }

  currentAudio = audio;
  loadingOverlay.style.display = 'none';

  // Build display items for syncing
  const displayItems = [];
  displayItems.push({ text: '願いましては', number: '' });
  numbers.forEach((n, i) => {
    const absN = Math.abs(n);
    const isLast = (i === numbers.length - 1);
    let readText, numText;

    if (n < 0) {
      numText = '−' + absN.toLocaleString();
      readText = isLast ? ('ひく' + absN + '円では') : ('ひく' + absN + '円');
    } else {
      numText = absN.toLocaleString();
      readText = isLast ? (absN + '円では') : (absN + '円なり');
    }
    displayItems.push({ text: readText, number: numText });
  });

  const totalItems = displayItems.length;
  let currentItem = -1;

  function updateDisplay(itemIndex) {
    if (itemIndex === currentItem || itemIndex >= totalItems) return;
    currentItem = itemIndex;
    const item = displayItems[itemIndex];

    if (config.showNumber) {
      playNumber.textContent = item.number;
    } else {
      playNumber.textContent = itemIndex === 0 ? '' : '・';
    }
    playNumber.className = 'play-number flash-in';
    playReading.textContent = item.text;
    playStatus.textContent = itemIndex === 0 ? '' : (itemIndex + ' / ' + numbers.length);
  }

  // Wait for metadata to get duration
  await new Promise((resolve) => {
    if (audio.readyState >= 1) {
      resolve();
    } else {
      audio.addEventListener('loadedmetadata', resolve, { once: true });
      // fallback timeout
      setTimeout(resolve, 3000);
    }
  });

  const duration = audio.duration || 0;

  // Start playback
  try {
    await audio.play();
  } catch (e) {
    // Mobile autoplay blocked - wait for tap
    playReading.textContent = 'タップして再生';
    playNumber.textContent = '▶';
    await new Promise((resolve) => {
      const tapHandler = async () => {
        document.removeEventListener('click', tapHandler);
        try { await audio.play(); } catch (err) { /* ignore */ }
        resolve();
      };
      document.addEventListener('click', tapHandler);
    });
  }

  // Sync display to audio time
  if (duration > 0) {
    const itemDuration = duration / totalItems;
    displayInterval = setInterval(() => {
      if (!currentAudio) return;
      const elapsed = audio.currentTime;
      const newItem = Math.min(Math.floor(elapsed / itemDuration), totalItems - 1);
      updateDisplay(newItem);
      progressBar.style.width = Math.min(100, (elapsed / duration * 100)) + '%';
    }, 80);
  } else {
    // Fallback: no duration available, show items at fixed intervals
    updateDisplay(0);
    const fallbackDelay = 2000;
    let idx = 0;
    displayInterval = setInterval(() => {
      idx++;
      if (idx < totalItems) {
        updateDisplay(idx);
        progressBar.style.width = ((idx + 1) / totalItems * 100) + '%';
      }
    }, fallbackDelay);
  }

  // Wait for audio to end
  await new Promise((resolve) => {
    audio.onended = resolve;
    audio.onerror = resolve;
  });

  // Cleanup interval
  if (displayInterval) {
    clearInterval(displayInterval);
    displayInterval = null;
  }
  progressBar.style.width = '100%';

  // Brief pause
  await new Promise(r => setTimeout(r, 400));

  if (config.autoAnswer) {
    // Go directly to result (show as "auto" with correct answer)
    showResult(correctAnswer, true);
  } else {
    // Go to input screen
    userAnswer = '';
    isNegative = false;
    updateAnswerDisplay();
    updateMinusBtn();
    showScreen('screen-answer');
  }
}

// ══════════════════════════════════
// Answer Input
// ══════════════════════════════════
function inputDigit(d) {
  if (userAnswer.length >= 12) return;
  if (userAnswer === '0') userAnswer = '';
  userAnswer += d;
  updateAnswerDisplay();
}

function backspace() {
  userAnswer = userAnswer.slice(0, -1);
  updateAnswerDisplay();
}

function toggleMinus() {
  isNegative = !isNegative;
  updateMinusBtn();
  updateAnswerDisplay();
}

function updateMinusBtn() {
  const btn = document.getElementById('minus-btn');
  btn.classList.toggle('negative', isNegative);
}

function updateAnswerDisplay() {
  const el = document.getElementById('answer-display');
  if (!userAnswer) {
    el.innerHTML = '<span class="placeholder">0</span>';
  } else {
    const sign = isNegative ? '−' : '';
    el.textContent = sign + Number(userAnswer).toLocaleString();
  }
}

function submitAnswer() {
  const val = (isNegative ? -1 : 1) * (parseInt(userAnswer, 10) || 0);
  showResult(val, false);
}

// ══════════════════════════════════
// Result
// ══════════════════════════════════
function showResult(userVal, isAutoAnswer) {
  const isCorrect = isAutoAnswer || (userVal === correctAnswer);

  const markEl = document.getElementById('result-mark');
  const correctEl = document.getElementById('result-correct-value');
  const yourAnswerEl = document.getElementById('result-your-answer');

  correctEl.textContent = correctAnswer.toLocaleString() + ' 円';

  if (isAutoAnswer) {
    markEl.textContent = '📖';
    markEl.className = 'result-mark pop';
    markEl.style.color = '#6366f1';
    yourAnswerEl.textContent = '';
  } else if (isCorrect) {
    markEl.textContent = '⭕';
    markEl.className = 'result-mark result-correct pop';
    markEl.style.color = '';
    yourAnswerEl.textContent = '';
  } else {
    markEl.textContent = '❌';
    markEl.className = 'result-mark result-wrong pop';
    markEl.style.color = '';
    yourAnswerEl.innerHTML = 'あなたの答え: <strong>' + userVal.toLocaleString() + '</strong>';
  }

  showScreen('screen-result');
}

function retryGame() {
  // Same numbers, replay
  lastSpeechText = buildSpeechText();
  replayWithCurrentNumbers();
}
